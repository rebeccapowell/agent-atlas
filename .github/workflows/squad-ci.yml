name: Squad CI
# Fast PR validation — restore, build, and test only.
# Release artifacts (Docker image) are handled by docker-publish.yml.

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore AgentAtlas.slnx

      - name: Build
        run: dotnet build AgentAtlas.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/Atlas.Host.Tests/Atlas.Host.Tests.csproj --no-build --configuration Release --verbosity normal
