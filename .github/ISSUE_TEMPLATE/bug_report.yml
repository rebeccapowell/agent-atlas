name: Bug Report
description: Report a bug or unexpected behaviour in Agent Atlas
title: "bug: "
labels: ["type:bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm you have completed the following before submitting.
      options:
        - label: I have searched the [existing issues](../../issues) and this has not been reported before.
          required: true
        - label: I am using a supported version of Agent Atlas.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Start Atlas with catalog at `...`
        2. Call `/v1/tools?query=...`
        3. Observe error response `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide relevant details about your environment.
      value: |
        - Agent Atlas version:
        - .NET SDK version (`dotnet --version`):
        - Deployment: Docker / Kubernetes / local dotnet run
        - OS:
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, related issues, or configuration that might be relevant.
