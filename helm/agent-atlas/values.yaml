# Default values for agent-atlas

replicaCount: 1

image:
  repository: agent-atlas
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agent-atlas.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Atlas configuration
atlas:
  catalogPath: /catalog
  catalogStrict: true

  oidc:
    issuer: ""
    audience: "api://agent-atlas"
    allowedIssuers: []

  platformPermissions:
    claim: "scp"
    search: "platform-code-mode:search"
    execute: "platform-code-mode:execute"
    executeWrite: "platform-code-mode:execute:write"

  execLimits:
    maxSteps: 50
    maxCalls: 50
    maxSeconds: 30
    maxBytes: 10485760
    maxResponseBytes: 1048576
    maxConcurrency: 1

# Catalog configuration
catalog:
  # Mount catalog from a ConfigMap
  configMap:
    enabled: false
    name: atlas-catalog

  # Mount catalog from a PersistentVolumeClaim
  pvc:
    enabled: false
    claimName: atlas-catalog

  # Git-sync sidecar for automatic catalog updates
  gitSync:
    enabled: false
    image: registry.k8s.io/git-sync/git-sync:v4.2.1
    repo: ""
    branch: "main"
    period: "60s"
    depth: 1
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
      requests:
        cpu: 50m
        memory: 32Mi

# Optional Redis for distributed caching (multi-replica)
redis:
  enabled: false
  host: ""
  port: 6379
  secretName: ""
  secretKey: "redis-password"

# Probes
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# Extra environment variables
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

# Extra volumes
extraVolumes: []
extraVolumeMounts: []
