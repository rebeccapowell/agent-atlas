name: Docker PR Check
# Validates that the Dockerfile still builds on every PR.
# Does NOT push — publishing is handled by docker-publish.yml on release.

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
    paths:
      - 'Dockerfile'
      - 'src/Atlas.Host/**'
      - '.github/workflows/docker-pr-check.yml'

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
