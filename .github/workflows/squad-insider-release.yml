name: Insider Release

on:
  push:
    branches: [insider]

permissions:
  contents: write

jobs:
  insider-release:
    name: Build, Test & Pre-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Restore dependencies
        run: dotnet restore src/Atlas.Host.Tests/Atlas.Host.Tests.csproj

      - name: Build
        run: dotnet build src/Atlas.Host.Tests/Atlas.Host.Tests.csproj --no-restore -c Release

      - name: Test
        run: >
          dotnet test src/Atlas.Host.Tests/Atlas.Host.Tests.csproj
          --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"

      - name: Create insider pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="insider-${TIMESTAMP}-${SHORT_SHA}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Insider Build $TAG" \
            --generate-notes \
            --prerelease
