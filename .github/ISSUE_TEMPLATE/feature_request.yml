name: Feature Request
description: Suggest a new feature or enhancement for Agent Atlas
title: "feat: "
labels: ["type:feature", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement to Agent Atlas!

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm you have completed the following before submitting.
      options:
        - label: I have searched the [existing issues](../../issues) and this has not been requested before.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the problem or limitation this feature would address.
      placeholder: As a platform engineer, I struggle to… / It's currently not possible to…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your preferred solution or approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider and why are they less suitable?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of Atlas does this feature relate to?
      options:
        - Catalog / data plane
        - MCP server / tool execution
        - Authentication / authorisation
        - Docker / deployment
        - CI / CD
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, mockups, or examples here.
