name: Preview Validation

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  validate:
    name: Build & Test (preview)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Restore dependencies
        run: dotnet restore src/Atlas.Host.Tests/Atlas.Host.Tests.csproj

      - name: Build
        run: dotnet build src/Atlas.Host.Tests/Atlas.Host.Tests.csproj --no-restore -c Release

      - name: Test
        run: >
          dotnet test src/Atlas.Host.Tests/Atlas.Host.Tests.csproj
          --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
