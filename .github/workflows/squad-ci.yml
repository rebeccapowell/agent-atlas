name: CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ['10.0.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
          dotnet-quality: preview

      - name: Restore dependencies
        run: dotnet restore src/Atlas.Host.Tests/Atlas.Host.Tests.csproj

      - name: Build
        run: dotnet build src/Atlas.Host.Tests/Atlas.Host.Tests.csproj --no-restore -c Release

      - name: Test with coverage
        run: >
          dotnet test src/Atlas.Host.Tests/Atlas.Host.Tests.csproj
          --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (${{ matrix.os }})
          path: TestResults/test-results.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 7
